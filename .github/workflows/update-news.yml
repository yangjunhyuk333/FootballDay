name: Update football articles

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch latest football articles
        run: node scripts/update-news.mjs --strict-network
      - name: Commit article updates
        run: |
          if [ -z "$(git status --porcelain data/articles.json data/articles.js)" ]; then
            echo "No article changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/articles.js
          git commit -m "Update football articles"
          git push
